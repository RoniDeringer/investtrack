name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: investtrack_test
          POSTGRES_USER: investtrack
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U investtrack -d investtrack_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo_pgsql, zip, bcmath, pcntl, redis
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install JS dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Prepare App Env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Migrations
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: investtrack_test
          DB_USERNAME: investtrack
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: php artisan migrate --force

      - name: Run Tests
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: investtrack_test
          DB_USERNAME: investtrack
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: php artisan test

