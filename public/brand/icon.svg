<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="InvestTrack icon">
  <defs>
    <linearGradient id="it-stroke" x1="48" y1="48" x2="208" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4de1c1"/>
      <stop offset="1" stop-color="#6aa7ff"/>
    </linearGradient>
    <linearGradient id="it-fill" x1="56" y1="44" x2="200" y2="212" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1629"/>
      <stop offset="1" stop-color="#0b0f1a"/>
    </linearGradient>
    <filter id="it-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Octagon (night theme) -->
  <path
    filter="url(#it-shadow)"
    d="M88 32h80l56 56v80l-56 56H88l-56-56V88l56-56Z"
    fill="url(#it-fill)"
    stroke="url(#it-stroke)"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- Exponential up-trend arrow -->
  <path
    d="M76 166 C 108 154, 124 142, 140 124 C 154 108, 170 92, 190 80"
    fill="none"
    stroke="rgba(255,255,255,0.92)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M168 82 L 190 80 L 182 102"
    fill="none"
    stroke="rgba(255,255,255,0.92)"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
